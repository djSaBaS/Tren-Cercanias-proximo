<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cercanías · Próximos trenes</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      crossorigin="anonymous"
    />

    <style>
      body { background: #f6f7fb; }
      .wrap { max-width: 980px; }
      .card { border: 0; box-shadow: 0 10px 30px rgba(16,24,40,.08); border-radius: 16px; }
      .time-big { font-size: 2rem; font-weight: 800; line-height: 1.1; }
      .time-small { font-size: .95rem; opacity: .8; }
      .platform-badge { font-weight: 700; }
      .gap-y { display: grid; gap: 14px; }
      .muted { opacity: .75; }
      .mono {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      }
    </style>
  </head>

  <body>
    <main class="container py-4 wrap">
      <div class="mb-3">
        <h1 class="h3 mb-1">Cercanías · Próximos trenes</h1>
        <div class="text-secondary">
          <span id="clock">--:--:--</span>
          <span class="mx-2">·</span>
          <span id="status" class="muted">Preparando…</span>
        </div>
      </div>

      <div class="card">
        <div class="card-body p-4">
          <div class="mb-3">
            <h2 class="h4 mb-1" id="stationTitle">Estación: —</h2>
            <p class="mb-0 text-secondary" id="subtitle">Estos son los próximos trenes.</p>
          </div>

          <div id="alertBox" class="alert alert-warning d-none" role="alert">
            <span id="alertText">—</span>
          </div>

          <div id="trainList" class="gap-y"></div>

          <div class="mt-3 text-secondary small">
            <span>Se actualiza automáticamente (sin botones).</span>
            <span class="mx-2">·</span>
            <span id="refreshInfo">Refresco: —</span>
          </div>
        </div>
      </div>
    </main>

    <script>
      // =========================
      // ENDPOINTS RENFE GTFS-RT
      // =========================
      const TRIP_UPDATES_URL = "https://gtfsrt.renfe.com/trip_updates.json";
      const VEHICLE_POSITIONS_URL = "https://gtfsrt.renfe.com/vehicle_positions.json";

      // =========================
      // CONFIG
      // =========================
      const REFRESH_MS = 60_000;
      const CLOCK_MS = 500;

      // Subimos el timeout: los feeds pueden tardar.
      const TIMEOUT_TRIP_UPDATES_MS = 25_000;
      const TIMEOUT_VEHICLES_MS = 25_000;

      // Esta parte sigue siendo “rápida” (sin GTFS ZIP). OJO: estos IDs pueden NO ser los stop_id reales.
      const DEFAULT_STOP_ID_ATOCHA = "18000";
      const DEFAULT_STOP_ID_CHAMARTIN = "17000";

      const STATION_NAME_ATOCHA = "Madrid-Puerta de Atocha";
      const STATION_NAME_CHAMARTIN = "Madrid-Chamartín";

      // =========================
      // DOM
      // =========================
      const clockEl = document.getElementById("clock");
      const statusEl = document.getElementById("status");
      const stationTitleEl = document.getElementById("stationTitle");
      const subtitleEl = document.getElementById("subtitle");
      const trainListEl = document.getElementById("trainList");
      const alertBoxEl = document.getElementById("alertBox");
      const alertTextEl = document.getElementById("alertText");
      const refreshInfoEl = document.getElementById("refreshInfo");

      refreshInfoEl.textContent = `Refresco: ${Math.round(REFRESH_MS / 1000)}s`;

      let isUpdating = false;

      // =========================
      // UI helpers
      // =========================
      function setAlert(message) {
        if (!message) {
          alertBoxEl.classList.add("d-none");
          alertTextEl.textContent = "";
          return;
        }
        alertTextEl.textContent = message;
        alertBoxEl.classList.remove("d-none");
      }

      function escapeHtml(text) {
        const raw = String(text ?? "");
        return raw
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function pad2(value) {
        return String(value).padStart(2, "0");
      }

      function tickClock() {
        const now = new Date();
        clockEl.textContent = `${pad2(now.getHours())}:${pad2(now.getMinutes())}:${pad2(now.getSeconds())}`;
      }

      // =========================
      // Time mode
      // =========================
      function getModeByTime(now) {
        const h = now.getHours();
        const m = now.getMinutes();

        if (h < 12 || (h === 12 && m === 0)) {
          return { stationTitle: STATION_NAME_ATOCHA, originId: DEFAULT_STOP_ID_ATOCHA, destId: DEFAULT_STOP_ID_CHAMARTIN };
        }
        return { stationTitle: STATION_NAME_CHAMARTIN, originId: DEFAULT_STOP_ID_CHAMARTIN, destId: DEFAULT_STOP_ID_ATOCHA };
      }

      // =========================
      // Fetch con AbortController + fallback CORS
      // =========================
      async function fetchJson(url, timeoutMs) {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), timeoutMs);

        try {
          const res = await fetch(url, { cache: "no-store", signal: controller.signal });
          if (!res.ok) {
            throw new Error(`HTTP ${res.status}`);
          }
          return await res.json();
        } finally {
          clearTimeout(timeoutId);
        }
      }

      async function fetchJsonWithFallback(url, timeoutMs) {
        // 1) Intento directo (si hay CORS permitido y va rápido)
        try {
          return { data: await fetchJson(url, timeoutMs), via: "direct" };
        } catch (e1) {
          // 2) Fallback por AllOrigins (suele funcionar en GitHub Pages)
          const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`;
          try {
            return { data: await fetchJson(proxyUrl, timeoutMs), via: "allorigins" };
          } catch (e2) {
            const msg = `Direct: ${String(e1?.message || e1)} | Proxy: ${String(e2?.message || e2)}`;
            throw new Error(`No se pudo obtener JSON. ${msg}`);
          }
        }
      }

      // =========================
      // GTFS-RT helpers
      // =========================
      function epochNowSeconds() {
        return Math.floor(Date.now() / 1000);
      }

      function toLocalTimeStrFromEpoch(epochSeconds) {
        if (!epochSeconds || Number.isNaN(Number(epochSeconds))) {
          return "";
        }
        const d = new Date(Number(epochSeconds) * 1000);
        return `${pad2(d.getHours())}:${pad2(d.getMinutes())}`;
      }

      function pickStopTimesFromTripUpdate(tripUpdate, originStopId, destStopId) {
        const updates = Array.isArray(tripUpdate?.stop_time_update) ? tripUpdate.stop_time_update : [];
        if (!updates.length) {
          return null;
        }

        let origin = null;
        let dest = null;

        for (const u of updates) {
          const stopId = String(u?.stop_id || "");
          if (!stopId) {
            continue;
          }

          const arrTime = u?.arrival?.time ? Number(u.arrival.time) : null;
          const depTime = u?.departure?.time ? Number(u.departure.time) : null;

          if (stopId === originStopId) {
            origin = { stopId, arrTime, depTime };
          }

          if (stopId === destStopId) {
            dest = { stopId, arrTime, depTime };
          }
        }

        if (!origin || !dest) {
          return null;
        }

        return { origin, dest };
      }

      function isFutureTrain(originTimes) {
        const now = epochNowSeconds();
        const t = originTimes?.depTime || originTimes?.arrTime || 0;
        return t > now;
      }

      function extractPlatformFromLabel(label) {
        const raw = String(label || "");
        const match = raw.match(/PLATF\.\((\d+)\)/i);
        return match ? match[1] : "";
      }

      function extractLineFromLabel(label) {
        const raw = String(label || "");
        const match = raw.match(/^([A-Z]\d+)-/i);
        return match ? match[1].toUpperCase() : "";
      }

      function buildVehicleMapByTripId(vehiclePositionsJson) {
        const map = new Map();
        const entities = Array.isArray(vehiclePositionsJson?.entity) ? vehiclePositionsJson.entity : [];

        for (const ent of entities) {
          const v = ent?.vehicle;
          const tripId = v?.trip?.trip_id;
          if (!tripId) {
            continue;
          }

          const label = v?.vehicle?.label || "";
          map.set(tripId, {
            platform: extractPlatformFromLabel(label),
            line: extractLineFromLabel(label),
          });
        }

        return map;
      }

      // =========================
      // Render
      // =========================
      function renderTrains(trains) {
        if (!trains.length) {
          trainListEl.innerHTML = `
            <div class="alert alert-info mb-0" role="alert">
              No hay trenes próximos (o los stop_id no coinciden con los de GTFS-RT).
            </div>
          `;
          return;
        }

        trainListEl.innerHTML = trains
          .map((t, idx) => {
            const platform = t.platform ? escapeHtml(t.platform) : "—";
            const line = t.line ? escapeHtml(t.line) : "—";

            return `
              <div class="border rounded-4 p-3 bg-white">
                <div class="d-flex align-items-start justify-content-between gap-3">
                  <div>
                    <div class="small text-secondary mb-1">
                      Tren ${idx + 1} <span class="mono text-secondary">${escapeHtml(t.tripId || "")}</span>
                    </div>
                    <div class="time-big">${escapeHtml(t.originArrival || "—")}</div>
                    <div class="time-small text-secondary">Salida prevista: <strong>${escapeHtml(t.originDeparture || "—")}</strong></div>
                    <div class="mt-2 text-secondary small">Estimación llegada destino: <strong>${escapeHtml(t.destArrival || "—")}</strong></div>
                  </div>
                  <div class="text-end">
                    <div class="badge text-bg-dark platform-badge mb-2">Andén/Vía: ${platform}</div>
                    <div class="text-secondary small">Línea: <strong>${line}</strong></div>
                  </div>
                </div>
              </div>
            `;
          })
          .join("");
      }

      // =========================
      // Lógica principal
      // =========================
      async function update() {
        if (isUpdating) {
          return;
        }

        isUpdating = true;
        setAlert("");
        statusEl.textContent = "Actualizando…";

        try {
          const now = new Date();
          const mode = getModeByTime(now);

          stationTitleEl.textContent = `Estación: ${mode.stationTitle}`;
          subtitleEl.textContent = "Estos son los próximos trenes.";

          statusEl.textContent = "Descargando trip_updates…";
          const tripUpdatesFetch = await fetchJsonWithFallback(TRIP_UPDATES_URL, TIMEOUT_TRIP_UPDATES_MS);

          const entities = Array.isArray(tripUpdatesFetch.data?.entity) ? tripUpdatesFetch.data.entity : [];
          const candidates = [];

          for (const ent of entities) {
            const tu = ent?.trip_update;
            const tripId = tu?.trip?.trip_id || "";
            if (!tripId) {
              continue;
            }

            const times = pickStopTimesFromTripUpdate(tu, mode.originId, mode.destId);
            if (!times) {
              continue;
            }

            if (!isFutureTrain(times.origin)) {
              continue;
            }

            candidates.push({
              tripId,
              sortEpoch: times.origin.depTime || times.origin.arrTime || 0,
              originArrival: toLocalTimeStrFromEpoch(times.origin.arrTime || times.origin.depTime),
              originDeparture: toLocalTimeStrFromEpoch(times.origin.depTime || times.origin.arrTime),
              destArrival: toLocalTimeStrFromEpoch(times.dest.arrTime || times.dest.depTime),
              platform: "",
              line: "",
            });
          }

          candidates.sort((a, b) => a.sortEpoch - b.sortEpoch);

          const top2 = candidates.slice(0, 2);

          // Solo si ya tenemos trenes candidatos, pedimos vehicles para sacar andén/línea (ahorra tiempo).
          if (top2.length) {
            statusEl.textContent = "Descargando vehicle_positions…";
            const vehiclesFetch = await fetchJsonWithFallback(VEHICLE_POSITIONS_URL, TIMEOUT_VEHICLES_MS);

            const vehicleMap = buildVehicleMapByTripId(vehiclesFetch.data);

            for (const t of top2) {
              const v = vehicleMap.get(t.tripId);
              if (v) {
                t.platform = v.platform || "";
                t.line = v.line || "";
              }
            }

            const usedProxy = tripUpdatesFetch.via !== "direct" || vehiclesFetch.via !== "direct";
            if (usedProxy) {
              setAlert("Nota: el navegador ha bloqueado CORS y se ha usado un proxy público para leer los datos.");
            }
          } else {
            setAlert(
              `No se han encontrado viajes con stop_id origen/destino = ${mode.originId} → ${mode.destId}. ` +
              `Esto puede significar que esos stop_id no son los reales del feed GTFS-RT.`
            );
          }

          renderTrains(top2);
          statusEl.textContent = "Actualizado.";
        } catch (err) {
          statusEl.textContent = "Error al actualizar.";
          setAlert(`Fallo: ${String(err?.message || err)}`);
          renderTrains([]);
        } finally {
          isUpdating = false;
        }
      }

      setInterval(tickClock, CLOCK_MS);
      tickClock();

      update();
      setInterval(update, REFRESH_MS);
    </script>
  </body>
</html>
