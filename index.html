<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cercanías · Próximos trenes</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      crossorigin="anonymous"
    />

    <style>
      body { background: #f6f7fb; }
      .wrap { max-width: 980px; }
      .card { border: 0; box-shadow: 0 10px 30px rgba(16,24,40,.08); border-radius: 16px; }
      .time-big { font-size: 2rem; font-weight: 800; line-height: 1.1; }
      .time-small { font-size: .95rem; opacity: .8; }
      .platform-badge { font-weight: 700; }
      .gap-y { display: grid; gap: 14px; }
      .muted { opacity: .75; }
      .mono {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  </head>

  <body>
    <main class="container py-4 wrap">
      <div class="mb-3">
        <h1 class="h3 mb-1">Cercanías · Próximos trenes</h1>
        <div class="text-secondary">
          <span id="clock">--:--:--</span>
          <span class="mx-2">·</span>
          <span id="status" class="muted">Preparando…</span>
        </div>
      </div>

      <div class="card">
        <div class="card-body p-4">
          <div class="mb-3">
            <h2 class="h4 mb-1" id="stationTitle">Estación: —</h2>
            <p class="mb-0 text-secondary" id="subtitle">Estos son los próximos trenes.</p>
          </div>

          <div id="alertBox" class="alert alert-warning d-none" role="alert">
            <span id="alertText">—</span>
          </div>

          <div id="trainList" class="gap-y"></div>

          <div class="mt-3 text-secondary small">
            <span>Se actualiza automáticamente (sin botones).</span>
            <span class="mx-2">·</span>
            <span id="refreshInfo">Refresco: —</span>
          </div>
        </div>
      </div>
    </main>

    <script>
      const GTFS_ZIP_URL = "https://ssl.renfe.com/ftransit/Fichero_CER_FOMENTO/fomento_transit.zip";
      const TRIP_UPDATES_URL = "https://gtfsrt.renfe.com/trip_updates.json";
      const VEHICLE_POSITIONS_URL = "https://gtfsrt.renfe.com/vehicle_positions.json";

      const REFRESH_MS = 60_000;
      const CLOCK_MS = 500;

      const STATION_NAME_ATOCHA = "Madrid-Puerta de Atocha";
      const STATION_NAME_CHAMARTIN = "Madrid-Chamartín";

      const STOP_NAME_HINTS_ATOCHA = ["ATOCHA", "MADRID-ATOCHA", "PUERTA DE ATOCHA"];
      const STOP_NAME_HINTS_CHAMARTIN = ["CHAMARTIN", "MADRID-CHAMARTIN", "CLARA CAMPOAMOR"];

      const DEFAULT_STOP_ID_ATOCHA = "18000";
      const DEFAULT_STOP_ID_CHAMARTIN = "17000";

      const MAX_FAST_START_MS = 8000;

      const clockEl = document.getElementById("clock");
      const statusEl = document.getElementById("status");
      const stationTitleEl = document.getElementById("stationTitle");
      const subtitleEl = document.getElementById("subtitle");
      const trainListEl = document.getElementById("trainList");
      const alertBoxEl = document.getElementById("alertBox");
      const alertTextEl = document.getElementById("alertText");
      const refreshInfoEl = document.getElementById("refreshInfo");

      refreshInfoEl.textContent = `Refresco: ${Math.round(REFRESH_MS / 1000)}s`;

      let isUpdating = false;

      let cachedStops = null;
      let cachedStopIdAtocha = DEFAULT_STOP_ID_ATOCHA;
      let cachedStopIdChamartin = DEFAULT_STOP_ID_CHAMARTIN;

      function setAlert(message) {
        if (!message) {
          alertBoxEl.classList.add("d-none");
          alertTextEl.textContent = "";
          return;
        }
        alertTextEl.textContent = message;
        alertBoxEl.classList.remove("d-none");
      }

      function escapeHtml(text) {
        const raw = String(text ?? "");
        return raw
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function pad2(value) {
        return String(value).padStart(2, "0");
      }

      function tickClock() {
        const now = new Date();
        clockEl.textContent = `${pad2(now.getHours())}:${pad2(now.getMinutes())}:${pad2(now.getSeconds())}`;
      }

      function getModeByTime(now) {
        const h = now.getHours();
        const m = now.getMinutes();

        if (h < 12 || (h === 12 && m === 0)) {
          return { stationTitle: STATION_NAME_ATOCHA, originKey: "ATOCHA", destKey: "CHAMARTIN" };
        }
        return { stationTitle: STATION_NAME_CHAMARTIN, originKey: "CHAMARTIN", destKey: "ATOCHA" };
      }

      function withTimeout(promise, ms, label) {
        return Promise.race([
          promise,
          new Promise((_, reject) => setTimeout(() => reject(new Error(`Timeout (${label}) tras ${ms}ms`)), ms)),
        ]);
      }

      async function fetchJsonWithFallback(url) {
        const attempts = [
          { type: "direct", buildUrl: (u) => u },
          { type: "allorigins", buildUrl: (u) => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}` },
        ];

        let lastErr = null;

        for (const attempt of attempts) {
          try {
            const res = await fetch(attempt.buildUrl(url), { cache: "no-store" });
            if (!res.ok) {
              throw new Error(`HTTP ${res.status}`);
            }
            const data = await res.json();
            return { data, via: attempt.type };
          } catch (e) {
            lastErr = e;
            continue;
          }
        }

        throw new Error(`No se pudo obtener JSON (CORS/red). Detalle: ${String(lastErr?.message || lastErr)}`);
      }

      async function fetchArrayBufferWithFallback(url) {
        const attempts = [
          { type: "direct", buildUrl: (u) => u },
          { type: "allorigins", buildUrl: (u) => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}` },
        ];

        let lastErr = null;

        for (const attempt of attempts) {
          try {
            const res = await fetch(attempt.buildUrl(url), { cache: "no-store" });
            if (!res.ok) {
              throw new Error(`HTTP ${res.status}`);
            }
            const buffer = await res.arrayBuffer();
            return { buffer, via: attempt.type };
          } catch (e) {
            lastErr = e;
            continue;
          }
        }

        throw new Error(`No se pudo obtener ZIP (CORS/red). Detalle: ${String(lastErr?.message || lastErr)}`);
      }

      function parseCsvLine(line) {
        const result = [];
        let current = "";
        let inQuotes = false;

        for (let i = 0; i < line.length; i++) {
          const ch = line[i];

          if (ch === '"') {
            if (inQuotes && line[i + 1] === '"') {
              current += '"';
              i++;
              continue;
            }
            inQuotes = !inQuotes;
            continue;
          }

          if (ch === "," && !inQuotes) {
            result.push(current);
            current = "";
            continue;
          }

          current += ch;
        }

        result.push(current);
        return result;
      }

      function parseStopsTxt(stopsText) {
        const lines = stopsText.split(/\r?\n/).filter((l) => l.trim().length > 0);
        if (lines.length < 2) {
          return [];
        }

        const headers = parseCsvLine(lines[0]).map((h) => h.trim());
        const idxStopId = headers.indexOf("stop_id");
        const idxStopName = headers.indexOf("stop_name");

        if (idxStopId === -1 || idxStopName === -1) {
          return [];
        }

        const stops = [];
        for (let i = 1; i < lines.length; i++) {
          const cols = parseCsvLine(lines[i]);
          const stopId = (cols[idxStopId] || "").trim();
          const stopName = (cols[idxStopName] || "").trim();
          if (stopId && stopName) {
            stops.push({ stopId, stopName });
          }
        }

        return stops;
      }

      function findStopIdByHints(stops, hints) {
        const upperHints = hints.map((h) => String(h).toUpperCase());

        const scored = stops
          .map((s) => {
            const nameU = s.stopName.toUpperCase();
            const hits = upperHints.reduce((acc, h) => (nameU.includes(h) ? acc + 1 : acc), 0);
            return { ...s, hits };
          })
          .filter((x) => x.hits > 0)
          .sort((a, b) => b.hits - a.hits);

        return scored.length ? scored[0].stopId : null;
      }

      async function loadStopsFromZipIfPossible() {
        if (cachedStops && cachedStopIdAtocha && cachedStopIdChamartin) {
          return { via: "cache" };
        }

        if (typeof window.JSZip === "undefined") {
          throw new Error("JSZip no está disponible (bloqueado por el editor online o CDN).");
        }

        statusEl.textContent = "Cargando paradas (GTFS ZIP)…";

        const zipFetch = await withTimeout(fetchArrayBufferWithFallback(GTFS_ZIP_URL), 15000, "GTFS ZIP");
        const zip = await JSZip.loadAsync(zipFetch.buffer);

        const stopsFile = zip.file("stops.txt");
        if (!stopsFile) {
          throw new Error("El ZIP GTFS no contiene stops.txt");
        }

        const stopsText = await stopsFile.async("string");
        const stops = parseStopsTxt(stopsText);

        if (!stops.length) {
          throw new Error("No se pudo parsear stops.txt (vacío o formato inesperado).");
        }

        const stopIdAtocha = findStopIdByHints(stops, STOP_NAME_HINTS_ATOCHA);
        const stopIdChamartin = findStopIdByHints(stops, STOP_NAME_HINTS_CHAMARTIN);

        if (!stopIdAtocha || !stopIdChamartin) {
          throw new Error("No se han podido localizar Atocha/Chamartín en stops.txt por nombre.");
        }

        cachedStops = stops;
        cachedStopIdAtocha = stopIdAtocha;
        cachedStopIdChamartin = stopIdChamartin;

        return { via: zipFetch.via };
      }

      function epochNowSeconds() {
        return Math.floor(Date.now() / 1000);
      }

      function toLocalTimeStrFromEpoch(epochSeconds) {
        if (!epochSeconds || Number.isNaN(Number(epochSeconds))) {
          return "";
        }
        const d = new Date(Number(epochSeconds) * 1000);
        return `${pad2(d.getHours())}:${pad2(d.getMinutes())}`;
      }

      function extractPlatformFromLabel(label) {
        const raw = String(label || "");
        const match = raw.match(/PLATF\.\((\d+)\)/i);
        return match ? match[1] : "";
      }

      function extractLineFromLabel(label) {
        const raw = String(label || "");
        const match = raw.match(/^([A-Z]\d+)-/i);
        return match ? match[1].toUpperCase() : "";
      }

      function buildVehicleMapByTripId(vehiclePositionsJson) {
        const map = new Map();
        const entities = Array.isArray(vehiclePositionsJson?.entity) ? vehiclePositionsJson.entity : [];

        for (const ent of entities) {
          const v = ent?.vehicle;
          const tripId = v?.trip?.trip_id;
          if (!tripId) {
            continue;
          }

          const label = v?.vehicle?.label || "";
          map.set(tripId, {
            label,
            platform: extractPlatformFromLabel(label),
            line: extractLineFromLabel(label),
          });
        }

        return map;
      }

      function pickStopTimesFromTripUpdate(tripUpdate, originStopId, destStopId) {
        const updates = Array.isArray(tripUpdate?.stop_time_update) ? tripUpdate.stop_time_update : [];
        if (!updates.length) {
          return null;
        }

        let origin = null;
        let dest = null;

        for (const u of updates) {
          const stopId = String(u?.stop_id || "");
          if (!stopId) {
            continue;
          }

          const arrTime = u?.arrival?.time ? Number(u.arrival.time) : null;
          const depTime = u?.departure?.time ? Number(u.departure.time) : null;

          if (stopId === originStopId) {
            origin = { stopId, arrTime, depTime };
          }

          if (stopId === destStopId) {
            dest = { stopId, arrTime, depTime };
          }
        }

        if (!origin || !dest) {
          return null;
        }

        return { origin, dest };
      }

      function isFutureTrain(originTimes) {
        const now = epochNowSeconds();
        const t = originTimes?.depTime || originTimes?.arrTime || 0;
        return t > now;
      }

      function renderTrains(trains) {
        if (!trains.length) {
          trainListEl.innerHTML = `
            <div class="alert alert-info mb-0" role="alert">
              No hay trenes próximos encontrados con estos IDs de parada.
            </div>
          `;
          return;
        }

        trainListEl.innerHTML = trains
          .map((t, idx) => {
            const arrivalOrigin = t.originArrival || "—";
            const departureOrigin = t.originDeparture || "—";
            const etaDest = t.destArrival || "—";

            const platform = t.platform ? escapeHtml(t.platform) : "—";
            const line = t.line ? escapeHtml(t.line) : "—";

            return `
              <div class="border rounded-4 p-3 bg-white">
                <div class="d-flex align-items-start justify-content-between gap-3">
                  <div>
                    <div class="small text-secondary mb-1">
                      Tren ${idx + 1} <span class="mono text-secondary">${escapeHtml(t.tripId || "")}</span>
                    </div>
                    <div class="time-big">${escapeHtml(arrivalOrigin)}</div>
                    <div class="time-small text-secondary">Salida prevista: <strong>${escapeHtml(departureOrigin)}</strong></div>
                    <div class="mt-2 text-secondary small">Estimación llegada destino: <strong>${escapeHtml(etaDest)}</strong></div>
                  </div>
                  <div class="text-end">
                    <div class="badge text-bg-dark platform-badge mb-2">Andén/Vía: ${platform}</div>
                    <div class="text-secondary small">Línea: <strong>${line}</strong></div>
                  </div>
                </div>
              </div>
            `;
          })
          .join("");
      }

      async function getNextTrains(originStopId, destStopId) {
        const tripUpdatesFetch = await withTimeout(fetchJsonWithFallback(TRIP_UPDATES_URL), 12000, "trip_updates");
        const vehiclesFetch = await withTimeout(fetchJsonWithFallback(VEHICLE_POSITIONS_URL), 12000, "vehicle_positions");

        const vehicleMap = buildVehicleMapByTripId(vehiclesFetch.data);

        const entities = Array.isArray(tripUpdatesFetch.data?.entity) ? tripUpdatesFetch.data.entity : [];
        const candidates = [];

        for (const ent of entities) {
          const tu = ent?.trip_update;
          const tripId = tu?.trip?.trip_id || "";
          if (!tripId) {
            continue;
          }

          const times = pickStopTimesFromTripUpdate(tu, originStopId, destStopId);
          if (!times) {
            continue;
          }

          if (!isFutureTrain(times.origin)) {
            continue;
          }

          const originArrival = toLocalTimeStrFromEpoch(times.origin.arrTime || times.origin.depTime);
          const originDeparture = toLocalTimeStrFromEpoch(times.origin.depTime || times.origin.arrTime);
          const destArrival = toLocalTimeStrFromEpoch(times.dest.arrTime || times.dest.depTime);

          const v = vehicleMap.get(tripId);

          candidates.push({
            tripId,
            sortEpoch: times.origin.depTime || times.origin.arrTime || 0,
            originArrival,
            originDeparture,
            destArrival,
            platform: v?.platform || "",
            line: v?.line || "",
          });
        }

        candidates.sort((a, b) => a.sortEpoch - b.sortEpoch);

        return {
          trains: candidates.slice(0, 2),
          via: { tripUpdates: tripUpdatesFetch.via, vehicles: vehiclesFetch.via },
        };
      }

      async function update() {
        if (isUpdating) {
          return;
        }

        isUpdating = true;
        statusEl.textContent = "Actualizando…";
        setAlert("");

        try {
          const now = new Date();
          const mode = getModeByTime(now);

          stationTitleEl.textContent = `Estación: ${mode.stationTitle}`;
          subtitleEl.textContent = "Estos son los próximos trenes.";

          const originStopIdFast = mode.originKey === "ATOCHA" ? DEFAULT_STOP_ID_ATOCHA : DEFAULT_STOP_ID_CHAMARTIN;
          const destStopIdFast = mode.destKey === "ATOCHA" ? DEFAULT_STOP_ID_ATOCHA : DEFAULT_STOP_ID_CHAMARTIN;

          statusEl.textContent = "Buscando trenes (rápido)…";

          const fastStart = await withTimeout(getNextTrains(originStopIdFast, destStopIdFast), MAX_FAST_START_MS, "fast-start");
          renderTrains(fastStart.trains);

          if (fastStart.trains.length > 0) {
            statusEl.textContent = "Actualizado.";
            return;
          }

          statusEl.textContent = "Sin trenes (rápido). Probando GTFS ZIP…";

          try {
            await loadStopsFromZipIfPossible();

            const originStopId = mode.originKey === "ATOCHA" ? cachedStopIdAtocha : cachedStopIdChamartin;
            const destStopId = mode.destKey === "ATOCHA" ? cachedStopIdAtocha : cachedStopIdChamartin;

            const fromZip = await getNextTrains(originStopId, destStopId);
            renderTrains(fromZip.trains);

            if (!fromZip.trains.length) {
              setAlert(
                `No hay trenes con stop_id rápido (${originStopIdFast}→${destStopIdFast}) ni con stop_id GTFS (${originStopId}→${destStopId}).`
              );
            }

            statusEl.textContent = "Actualizado.";
          } catch (zipErr) {
            setAlert(`El editor online puede bloquear el ZIP. Detalle ZIP: ${String(zipErr?.message || zipErr)}`);
            statusEl.textContent = "Actualizado (sin ZIP).";
          }
        } catch (err) {
          statusEl.textContent = "Error al actualizar.";
          setAlert(`Fallo: ${String(err?.message || err)}`);
          renderTrains([]);
        } finally {
          isUpdating = false;
        }
      }

      setInterval(tickClock, CLOCK_MS);
      tickClock();

      update();
      setInterval(update, REFRESH_MS);
    </script>
  </body>
</html>
