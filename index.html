<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cercanías · Próximos trenes</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      crossorigin="anonymous"
    />

    <style>
      body { background: #f6f7fb; }
      .wrap { max-width: 980px; }
      .card { border: 0; box-shadow: 0 10px 30px rgba(16,24,40,.08); border-radius: 16px; }
      .time-big { font-size: 2rem; font-weight: 800; line-height: 1.1; }
      .time-small { font-size: .95rem; opacity: .8; }
      .platform-badge { font-weight: 700; }
      .gap-y { display: grid; gap: 14px; }
      .muted { opacity: .75; }
      .mono {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      }
    </style>
  </head>

  <body>
    <main class="container py-4 wrap">
      <div class="mb-3">
        <h1 class="h3 mb-1">Cercanías · Próximos trenes</h1>
        <div class="text-secondary">
          <span id="clock">--:--:--</span>
          <span class="mx-2">·</span>
          <span id="status" class="muted">Preparando…</span>
        </div>
      </div>

      <div class="card">
        <div class="card-body p-4">
          <div class="mb-3">
            <h2 class="h4 mb-1" id="stationTitle">Estación: —</h2>
            <p class="mb-0 text-secondary" id="subtitle">Estos son los próximos trenes.</p>
          </div>

          <div id="alertBox" class="alert alert-warning d-none" role="alert">
            <span id="alertText">—</span>
          </div>

          <div id="trainList" class="gap-y"></div>

          <div class="mt-3 text-secondary small">
            <span>Se actualiza automáticamente (sin botones).</span>
            <span class="mx-2">·</span>
            <span id="refreshInfo">Refresco: —</span>
          </div>
        </div>
      </div>
    </main>

    <script>
      /* URL base de tu Cloudflare Worker (proxy CORS). */
      const PROXY_BASE_URL = "https://bitter-meadow-5628.juanantoniosanchezplaza.workers.dev";

      /* Endpoints GTFS-RT. */
      const TRIP_UPDATES_URL = "https://gtfsrt.renfe.com/trip_updates.json";
      const VEHICLE_POSITIONS_URL = "https://gtfsrt.renfe.com/vehicle_positions.json";

      /* Intervalos. */
      const REFRESH_MS = 60_000;
      const CLOCK_MS = 500;

      /* Timeouts. */
      const TIMEOUT_TRIP_UPDATES_MS = 25_000;
      const TIMEOUT_VEHICLES_MS = 25_000;

      /* Nombres. */
      const STATION_NAME_ATOCHA = "Madrid-Puerta de Atocha";
      const STATION_NAME_CHAMARTIN = "Madrid-Chamartín";

      /* Prefijos de stopId (según lo que ya has visto en tu debug). */
      const ATOCHA_PREFIXES = ["180", "181"];
      const CHAMARTIN_PREFIXES = ["170"];

      /* Líneas permitidas por modo (basado en el mapa y tu captura de ADIF). */
      const LINES_TO_CHAMARTIN_FROM_ATOCHA = new Set(["C1", "C2", "C3", "C4A", "C4B", "C7", "C8A", "C8B", "C10"]);
      const LINES_TO_ATOCHA_FROM_CHAMARTIN = new Set(["C2", "C3", "C4A", "C4B", "C7"]);

      /* DOM. */
      const clockEl = document.getElementById("clock");
      const statusEl = document.getElementById("status");
      const stationTitleEl = document.getElementById("stationTitle");
      const subtitleEl = document.getElementById("subtitle");
      const trainListEl = document.getElementById("trainList");
      const alertBoxEl = document.getElementById("alertBox");
      const alertTextEl = document.getElementById("alertText");
      const refreshInfoEl = document.getElementById("refreshInfo");

      /* Estado. */
      let isUpdating = false;

      /* UI helpers. */
      refreshInfoEl.textContent = `Refresco: ${Math.round(REFRESH_MS / 1000)}s`;

      function setAlert(message) {
        if (!message) {
          alertBoxEl.classList.add("d-none");
          alertTextEl.textContent = "";
          return;
        }
        alertTextEl.textContent = message;
        alertBoxEl.classList.remove("d-none");
      }

      function escapeHtml(text) {
        const raw = String(text ?? "");
        return raw
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function pad2(value) {
        return String(value).padStart(2, "0");
      }

      function tickClock() {
        const now = new Date();
        clockEl.textContent = `${pad2(now.getHours())}:${pad2(now.getMinutes())}:${pad2(now.getSeconds())}`;
      }

      function epochNowSeconds() {
        return Math.floor(Date.now() / 1000);
      }

      function toLocalTimeStrFromEpoch(epochSeconds) {
        if (!epochSeconds || Number.isNaN(Number(epochSeconds))) {
          return "";
        }
        const d = new Date(Number(epochSeconds) * 1000);
        return `${pad2(d.getHours())}:${pad2(d.getMinutes())}`;
      }

      function matchesByPrefix(stopId, prefixes) {
        const id = String(stopId || "");
        for (const p of prefixes) {
          if (id.startsWith(p)) {
            return true;
          }
        }
        return false;
      }

      function normalizeLineCode(line) {
        const raw = String(line || "").toUpperCase().trim();
        if (!raw) {
          return "";
        }
        return raw.replace(/\s+/g, "");
      }

      function parseLineFromTripId(tripId) {
        const raw = String(tripId || "");
        const m = raw.match(/(C\d{1,2}[AB]?)/i);
        return m ? normalizeLineCode(m[1]) : "";
      }

      function extractPlatformFromLabel(label) {
        const raw = String(label || "");
        const match = raw.match(/PLATF\.\((\d+)\)/i);
        return match ? match[1] : "";
      }

      function extractLineFromLabel(label) {
        const raw = String(label || "");
        const match = raw.match(/^([A-Z]\d+[A-Z]?)-/i);
        return match ? normalizeLineCode(match[1]) : "";
      }

      async function fetchJsonViaWorker(targetUrl, timeoutMs) {
        const proxyUrl = `${PROXY_BASE_URL}/?target=${encodeURIComponent(targetUrl)}`;
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), timeoutMs);

        try {
          const res = await fetch(proxyUrl, { cache: "no-store", signal: controller.signal });
          if (!res.ok) {
            throw new Error(`Proxy HTTP ${res.status}`);
          }
          return await res.json();
        } finally {
          clearTimeout(timeoutId);
        }
      }

      function buildVehicleMapByTripId(vehiclePositionsJson) {
        const map = new Map();
        const entities = Array.isArray(vehiclePositionsJson?.entity) ? vehiclePositionsJson.entity : [];

        for (const ent of entities) {
          const v = ent?.vehicle;
          const tripId = v?.trip?.trip_id || v?.trip?.tripId || "";
          if (!tripId) {
            continue;
          }
          const label = v?.vehicle?.label || "";
          map.set(tripId, {
            platform: extractPlatformFromLabel(label),
            line: extractLineFromLabel(label),
          });
        }
        return map;
      }

      function normalizeTripUpdateEntity(ent) {
        const tu = ent?.tripUpdate || ent?.trip_update || null;
        if (!tu) {
          return null;
        }
        const tripId = tu?.trip?.tripId || tu?.trip?.trip_id || "";
        const stopTimeUpdates = tu?.stopTimeUpdate || tu?.stop_time_update || [];
        return {
          tripId,
          stopTimeUpdates: Array.isArray(stopTimeUpdates) ? stopTimeUpdates : [],
        };
      }

      function normalizeStopTimeUpdate(stu) {
        const stopId = String(stu?.stopId || stu?.stop_id || "");
        const arrivalTime = stu?.arrival?.time ? Number(stu.arrival.time) : null;
        const departureTime = stu?.departure?.time ? Number(stu.departure.time) : null;
        return { stopId, arrivalTime, departureTime };
      }

      function isFutureTime(stu) {
        const now = epochNowSeconds();
        const t = stu.departureTime || stu.arrivalTime || 0;
        return t > now;
      }

      function getModeByTime(now) {
        const h = now.getHours();
        const m = now.getMinutes();

        if (h < 12 || (h === 12 && m === 0)) {
          return {
            stationTitle: STATION_NAME_ATOCHA,
            stationPrefixes: ATOCHA_PREFIXES,
            directionText: "Atocha → Chamartín",
            allowedLines: LINES_TO_CHAMARTIN_FROM_ATOCHA,
          };
        }

        return {
          stationTitle: STATION_NAME_CHAMARTIN,
          stationPrefixes: CHAMARTIN_PREFIXES,
          directionText: "Chamartín → Atocha",
          allowedLines: LINES_TO_ATOCHA_FROM_CHAMARTIN,
        };
      }

      function renderTrains(trains) {
        if (!trains.length) {
          trainListEl.innerHTML = `
            <div class="alert alert-info mb-0" role="alert">
              No hay trenes próximos encontrados.
            </div>
          `;
          return;
        }

        trainListEl.innerHTML = trains
          .map((t, idx) => {
            const platform = t.platform ? escapeHtml(t.platform) : "—";
            const line = t.line ? escapeHtml(t.line) : "—";

            return `
              <div class="border rounded-4 p-3 bg-white">
                <div class="d-flex align-items-start justify-content-between gap-3">
                  <div>
                    <div class="small text-secondary mb-1">
                      Tren ${idx + 1} <span class="mono text-secondary">${escapeHtml(t.tripId || "")}</span>
                    </div>
                    <div class="time-big">${escapeHtml(t.arrival || "—")}</div>
                    <div class="time-small text-secondary">
                      Salida prevista: <strong>${escapeHtml(t.departure || "—")}</strong>
                    </div>
                  </div>
                  <div class="text-end">
                    <div class="badge text-bg-dark platform-badge mb-2">Andén/Vía: ${platform}</div>
                    <div class="text-secondary small">Línea: <strong>${line}</strong></div>
                  </div>
                </div>
              </div>
            `;
          })
          .join("");
      }

      async function update() {
        if (isUpdating) {
          return;
        }

        isUpdating = true;
        setAlert("");
        statusEl.textContent = "Actualizando…";

        try {
          const now = new Date();
          const mode = getModeByTime(now);

          stationTitleEl.textContent = `Estación: ${mode.stationTitle}`;
          subtitleEl.textContent = `Estos son los próximos trenes (${mode.directionText}).`;

          statusEl.textContent = "Descargando trip_updates…";
          const tripUpdatesJson = await fetchJsonViaWorker(TRIP_UPDATES_URL, TIMEOUT_TRIP_UPDATES_MS);

          statusEl.textContent = "Descargando vehicle_positions…";
          const vehiclesJson = await fetchJsonViaWorker(VEHICLE_POSITIONS_URL, TIMEOUT_VEHICLES_MS);

          const vehicleMap = buildVehicleMapByTripId(vehiclesJson);

          const entities = Array.isArray(tripUpdatesJson?.entity) ? tripUpdatesJson.entity : [];
          const candidatesAll = [];

          for (const ent of entities) {
            const tu = normalizeTripUpdateEntity(ent);
            if (!tu || !tu.tripId || !tu.stopTimeUpdates.length) {
              continue;
            }

            for (const raw of tu.stopTimeUpdates) {
              const u = normalizeStopTimeUpdate(raw);

              if (!u.stopId) {
                continue;
              }

              if (!matchesByPrefix(u.stopId, mode.stationPrefixes)) {
                continue;
              }

              if (!isFutureTime(u)) {
                continue;
              }

              const sortEpoch = u.departureTime || u.arrivalTime || 0;
              const v = vehicleMap.get(tu.tripId) || { platform: "", line: "" };

              const lineFromVehicle = normalizeLineCode(v.line);
              const lineFromTripId = parseLineFromTripId(tu.tripId);
              const finalLine = lineFromVehicle || lineFromTripId;

              candidatesAll.push({
                tripId: tu.tripId,
                sortEpoch,
                arrival: toLocalTimeStrFromEpoch(u.arrivalTime || u.departureTime),
                departure: toLocalTimeStrFromEpoch(u.departureTime || u.arrivalTime),
                platform: v.platform || "",
                line: finalLine || "",
              });

              break;
            }
          }

          candidatesAll.sort((a, b) => a.sortEpoch - b.sortEpoch);

          const candidatesFiltered = candidatesAll.filter((t) => {
            if (!t.line) {
              return false;
            }
            return mode.allowedLines.has(t.line);
          });

          let top2 = candidatesFiltered.slice(0, 2);

          if (top2.length < 2) {
            top2 = candidatesAll.slice(0, 2);
            setAlert("Aviso: no se encontraron 2 trenes con filtro de dirección; se muestran los 2 próximos sin filtrar.");
          }

          renderTrains(top2);
          statusEl.textContent = "Actualizado.";
        } catch (err) {
          statusEl.textContent = "Error al actualizar.";
          setAlert(`Fallo: ${String(err?.message || err)}`);
          renderTrains([]);
        } finally {
          isUpdating = false;
        }
      }

      tickClock();
      setInterval(tickClock, CLOCK_MS);
      update();
      setInterval(update, REFRESH_MS);
    </script>
  </body>
</html>
