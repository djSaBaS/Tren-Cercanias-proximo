<!-- Definimos el tipo de documento como HTML5 -->
<!doctype html>
<!-- Abrimos el documento HTML e indicamos el idioma -->
<html lang="es">
<!-- Abrimos la cabecera del documento -->
<head>
  <!-- Definimos la codificación para soportar caracteres especiales -->
  <meta charset="utf-8" />
  <!-- Configuramos el viewport para que sea responsive -->
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <!-- Definimos el título de la pestaña -->
  <title>Cercanías · Próximos trenes</title>
  <!-- Describimos la página para SEO y previsualizaciones -->
  <meta name="description" content="Panel de próximos trenes Cercanías (Atocha ↔ Chamartín) con GTFS-RT, auto-refresh y debug opcional." />
  <!-- Declaramos el color de la barra del navegador en móviles -->
  <meta name="theme-color" content="#0b0f17" />
  <!-- Referenciamos un favicon (pon un renfe.ico o renfe.png en /assets/img/) -->
  <link rel="icon" href="./assets/img/favicon.png" />
  <!-- Cargamos el CSS principal -->
  <link rel="stylesheet" href="./assets/css/styles.css" />
</head>
<!-- Abrimos el cuerpo del documento -->
<body>
  <!-- Contenedor principal centrado -->
  <main class="page">
    <!-- Cabecera superior del panel -->
    <header class="topbar" aria-label="Cabecera del panel">
      <!-- Título -->
      <div class="title">
        <!-- Texto principal -->
        <h1>Cercanías · Próximos trenes</h1>
        <!-- Estado dinámico -->
        <p id="statusLine" class="status" aria-live="polite">--:--:-- · Preparando…</p>
      </div>

      <!-- Acciones de cabecera -->
      <div class="actions">
        <!-- Botón de ayuda/manual -->
        <a class="icon-btn" href="./manual.html" aria-label="Abrir manual de usuario" title="Manual">
          <!-- Icono de interrogación -->
          ?
        </a>
      </div>
    </header>

    <!-- Tarjeta principal -->
    <section class="card" aria-label="Panel de próximos trenes">
      <!-- Título estación -->
      <h2 id="stationName">Estación: —</h2>
      <!-- Subtítulo -->
      <p id="stationSubtitle" class="muted">Estos son los próximos trenes.</p>

      <!-- Contenedor de trenes -->
      <div id="trains" class="trains" aria-live="polite"></div>

      <!-- Pie de tarjeta -->
      <div class="card-footer">
        <!-- Información de refresco -->
        <p class="muted">Se actualiza automáticamente (sin botones). · Refresco: <span id="refreshLabel">—</span></p>
        <!-- Toggle de debug -->
        <button id="debugToggle" class="link-btn" type="button" aria-expanded="false" aria-controls="debugBox">
          Debug opcional (para comparar feed y panel).
        </button>
      </div>

      <!-- Caja debug (colapsable) -->
      <div id="debugBox" class="debug hidden" role="region" aria-label="Información de depuración"></div>
    </section>

    <!-- Pie de página -->
    <footer class="footer" aria-label="Pie de página">
      <!-- Texto de autoría -->
      <p>
        Creado por
        <a href="https://www.linkedin.com/in/juanantoniosanchezplaza/" target="_blank" rel="noopener">Juan Antonio Sanchez Plaza</a>
        ·
        <a href="https://github.com/djSaBaS/" target="_blank" rel="noopener">GitHub</a>
        ·
        <a href="https://djsabas.github.io/Porfolio/" target="_blank" rel="noopener">Porfolio</a>
      </p>
    </footer>
  </main>

  <!-- Cargamos librería utilitaria -->
  <script src="./assets/js/lib.js"></script>
  <!-- Cargamos lógica principal -->
  <script src="./assets/js/app.js"></script>
</body>
<!-- Cerramos el documento -->
</html>
