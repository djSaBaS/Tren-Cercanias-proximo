<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cercanías · Próximos trenes</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      crossorigin="anonymous"
    />

    <style>
      body { background: #f6f7fb; }
      .wrap { max-width: 980px; }
      .card { border: 0; box-shadow: 0 10px 30px rgba(16,24,40,.08); border-radius: 16px; }
      .time-big { font-size: 2rem; font-weight: 800; line-height: 1.1; }
      .time-small { font-size: .95rem; opacity: .8; }
      .platform-badge { font-weight: 700; }
      .gap-y { display: grid; gap: 14px; }
      .muted { opacity: .75; }
      .mono {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      }
      .debug {
        white-space: pre-wrap;
        font-size: .9rem;
      }
    </style>
  </head>

  <body>
    <main class="container py-4 wrap">
      <div class="mb-3">
        <h1 class="h3 mb-1">Cercanías · Próximos trenes</h1>
        <div class="text-secondary">
          <span id="clock">--:--:--</span>
          <span class="mx-2">·</span>
          <span id="status" class="muted">Preparando…</span>
        </div>
      </div>

      <div class="card">
        <div class="card-body p-4">
          <div class="mb-3">
            <h2 class="h4 mb-1" id="stationTitle">Estación: —</h2>
            <p class="mb-0 text-secondary" id="subtitle">Estos son los próximos trenes.</p>
          </div>

          <div id="alertBox" class="alert alert-warning d-none" role="alert">
            <span id="alertText">—</span>
          </div>

          <div id="trainList" class="gap-y"></div>

          <div class="mt-4 d-none" id="debugBox">
            <div class="alert alert-secondary mb-0" role="alert">
              <div class="fw-bold mb-2">Ayuda / debug (para ajustar stopId)</div>
              <div class="debug" id="debugText">—</div>
            </div>
          </div>

          <div class="mt-3 text-secondary small">
            <span>Se actualiza automáticamente (sin botones).</span>
            <span class="mx-2">·</span>
            <span id="refreshInfo">Refresco: —</span>
          </div>
        </div>
      </div>
    </main>

    <script>
      /* Definimos la URL base de TU Cloudflare Worker (proxy CORS). */
      const PROXY_BASE_URL = "https://bitter-meadow-5628.juanantoniosanchezplaza.workers.dev";

      /* Definimos endpoints GTFS-RT de Renfe. */
      const TRIP_UPDATES_URL = "https://gtfsrt.renfe.com/trip_updates.json";
      /* Definimos endpoints GTFS-RT de Renfe. */
      const VEHICLE_POSITIONS_URL = "https://gtfsrt.renfe.com/vehicle_positions.json";

      /* Definimos intervalos. */
      const REFRESH_MS = 60_000;
      /* Definimos intervalos. */
      const CLOCK_MS = 500;

      /* Definimos timeouts. */
      const TIMEOUT_TRIP_UPDATES_MS = 25_000;
      /* Definimos timeouts. */
      const TIMEOUT_VEHICLES_MS = 25_000;

      /* Definimos nombres visibles. */
      const STATION_NAME_ATOCHA = "Madrid-Puerta de Atocha";
      /* Definimos nombres visibles. */
      const STATION_NAME_CHAMARTIN = "Madrid-Chamartín";

      /* Definimos stopId exactos para Atocha detectados en tu feed. */
      const STOP_IDS_ATOCHA_EXACT = [
        /* Añadimos stopId detectado en debug. */
        "18005",
      ];

      /* Definimos prefijos de stopId para Atocha (familia 180xx). */
      const STOP_IDS_ATOCHA_PREFIX = [
        /* Añadimos prefijo de familia. */
        "180",
      ];

      /* Definimos stopId exactos para Chamartín detectados en tu feed. */
      const STOP_IDS_CHAMARTIN_EXACT = [
        /* Añadimos stopId detectado en debug. */
        "17004",
      ];

      /* Definimos prefijos de stopId para Chamartín (familia 170xx). */
      const STOP_IDS_CHAMARTIN_PREFIX = [
        /* Añadimos prefijo de familia. */
        "170",
      ];

      /* Capturamos elementos del DOM. */
      const clockEl = document.getElementById("clock");
      /* Capturamos elementos del DOM. */
      const statusEl = document.getElementById("status");
      /* Capturamos elementos del DOM. */
      const stationTitleEl = document.getElementById("stationTitle");
      /* Capturamos elementos del DOM. */
      const subtitleEl = document.getElementById("subtitle");
      /* Capturamos elementos del DOM. */
      const trainListEl = document.getElementById("trainList");
      /* Capturamos elementos del DOM. */
      const alertBoxEl = document.getElementById("alertBox");
      /* Capturamos elementos del DOM. */
      const alertTextEl = document.getElementById("alertText");
      /* Capturamos elementos del DOM. */
      const refreshInfoEl = document.getElementById("refreshInfo");
      /* Capturamos elementos del DOM. */
      const debugBoxEl = document.getElementById("debugBox");
      /* Capturamos elementos del DOM. */
      const debugTextEl = document.getElementById("debugText");

      /* Pintamos el intervalo de refresco. */
      refreshInfoEl.textContent = `Refresco: ${Math.round(REFRESH_MS / 1000)}s`;

      /* Controlamos si hay actualización en curso. */
      let isUpdating = false;

      /* Mostramos u ocultamos alertas. */
      function setAlert(message) {
        if (!message) {
          alertBoxEl.classList.add("d-none");
          alertTextEl.textContent = "";
          return;
        }
        alertTextEl.textContent = message;
        alertBoxEl.classList.remove("d-none");
      }

      /* Mostramos u ocultamos debug. */
      function setDebug(message) {
        if (!message) {
          debugBoxEl.classList.add("d-none");
          debugTextEl.textContent = "";
          return;
        }
        debugTextEl.textContent = message;
        debugBoxEl.classList.remove("d-none");
      }

      /* Escapamos HTML para evitar inyecciones. */
      function escapeHtml(text) {
        const raw = String(text ?? "");
        return raw
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      /* Formateamos a 2 dígitos. */
      function pad2(value) {
        return String(value).padStart(2, "0");
      }

      /* Actualizamos el reloj. */
      function tickClock() {
        const now = new Date();
        clockEl.textContent = `${pad2(now.getHours())}:${pad2(now.getMinutes())}:${pad2(now.getSeconds())}`;
      }

      /* Obtenemos epoch actual en segundos. */
      function epochNowSeconds() {
        return Math.floor(Date.now() / 1000);
      }

      /* Convertimos epoch a HH:MM. */
      function toLocalTimeStrFromEpoch(epochSeconds) {
        if (!epochSeconds || Number.isNaN(Number(epochSeconds))) {
          return "";
        }
        const d = new Date(Number(epochSeconds) * 1000);
        return `${pad2(d.getHours())}:${pad2(d.getMinutes())}`;
      }

      /* Validamos si un stopId coincide por lista exacta o por prefijo. */
      function matchesStopId(stopId, exactList, prefixList) {
        const id = String(stopId || "");
        if (exactList.includes(id)) {
          return true;
        }
        for (const p of prefixList) {
          if (id.startsWith(p)) {
            return true;
          }
        }
        return false;
      }

      /* Elegimos modo por hora. */
      function getModeByTime(now) {
        const h = now.getHours();
        const m = now.getMinutes();

        if (h < 12 || (h === 12 && m === 0)) {
          return {
            stationTitle: STATION_NAME_ATOCHA,
            originName: "Atocha",
            destName: "Chamartín",
            originExact: STOP_IDS_ATOCHA_EXACT,
            originPrefix: STOP_IDS_ATOCHA_PREFIX,
            destExact: STOP_IDS_CHAMARTIN_EXACT,
            destPrefix: STOP_IDS_CHAMARTIN_PREFIX,
          };
        }

        return {
          stationTitle: STATION_NAME_CHAMARTIN,
          originName: "Chamartín",
          destName: "Atocha",
          originExact: STOP_IDS_CHAMARTIN_EXACT,
          originPrefix: STOP_IDS_CHAMARTIN_PREFIX,
          destExact: STOP_IDS_ATOCHA_EXACT,
          destPrefix: STOP_IDS_ATOCHA_PREFIX,
        };
      }

      /* Descargamos JSON usando el Worker para evitar CORS. */
      async function fetchJsonViaWorker(targetUrl, timeoutMs) {
        const proxyUrl = `${PROXY_BASE_URL}/?target=${encodeURIComponent(targetUrl)}`;
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), timeoutMs);

        try {
          const res = await fetch(proxyUrl, { cache: "no-store", signal: controller.signal });
          if (!res.ok) {
            throw new Error(`Proxy HTTP ${res.status}`);
          }
          return await res.json();
        } finally {
          clearTimeout(timeoutId);
        }
      }

      /* Extraemos andén desde label (si Renfe lo incluye). */
      function extractPlatformFromLabel(label) {
        const raw = String(label || "");
        const match = raw.match(/PLATF\.\((\d+)\)/i);
        return match ? match[1] : "";
      }

      /* Extraemos línea desde label (si Renfe lo incluye). */
      function extractLineFromLabel(label) {
        const raw = String(label || "");
        const match = raw.match(/^([A-Z]\d+)-/i);
        return match ? match[1].toUpperCase() : "";
      }

      /* Construimos mapa tripId => {platform,line}. */
      function buildVehicleMapByTripId(vehiclePositionsJson) {
        const map = new Map();
        const entities = Array.isArray(vehiclePositionsJson?.entity) ? vehiclePositionsJson.entity : [];

        for (const ent of entities) {
          const v = ent?.vehicle;
          const tripId = v?.trip?.trip_id || v?.trip?.tripId || "";
          if (!tripId) {
            continue;
          }

          const label = v?.vehicle?.label || "";
          map.set(tripId, {
            platform: extractPlatformFromLabel(label),
            line: extractLineFromLabel(label),
          });
        }

        return map;
      }

      /* Normalizamos tripUpdate (por si cambia el casing). */
      function normalizeTripUpdateEntity(ent) {
        const tu = ent?.tripUpdate || ent?.trip_update || null;
        if (!tu) {
          return null;
        }

        const tripId = tu?.trip?.tripId || tu?.trip?.trip_id || "";
        const stopTimeUpdates = tu?.stopTimeUpdate || tu?.stop_time_update || [];

        return {
          tripId,
          stopTimeUpdates: Array.isArray(stopTimeUpdates) ? stopTimeUpdates : [],
        };
      }

      /* Normalizamos stopTimeUpdate (por si cambia el casing). */
      function normalizeStopTimeUpdate(stu) {
        const stopId = String(stu?.stopId || stu?.stop_id || "");
        const arrivalTime = stu?.arrival?.time ? Number(stu.arrival.time) : null;
        const departureTime = stu?.departure?.time ? Number(stu.departure.time) : null;
        return { stopId, arrivalTime, departureTime };
      }

      /* Localizamos tiempos de origen y destino usando coincidencia exacta o prefijo. */
      function pickTimesForOriginDest(stopTimeUpdates, originExact, originPrefix, destExact, destPrefix) {
        let origin = null;
        let dest = null;

        for (const raw of stopTimeUpdates) {
          const u = normalizeStopTimeUpdate(raw);
          if (!u.stopId) {
            continue;
          }

          if (!origin && matchesStopId(u.stopId, originExact, originPrefix)) {
            origin = u;
          }

          if (!dest && matchesStopId(u.stopId, destExact, destPrefix)) {
            dest = u;
          }

          if (origin && dest) {
            break;
          }
        }

        if (!origin || !dest) {
          return null;
        }

        return { origin, dest };
      }

      /* Validamos que sea futuro en origen. */
      function isFutureAtOrigin(originUpdate) {
        const now = epochNowSeconds();
        const t = originUpdate.departureTime || originUpdate.arrivalTime || 0;
        return t > now;
      }

      /* Pintamos trenes. */
      function renderTrains(trains) {
        if (!trains.length) {
          trainListEl.innerHTML = `
            <div class="alert alert-info mb-0" role="alert">
              No hay trenes próximos encontrados.
            </div>
          `;
          return;
        }

        trainListEl.innerHTML = trains
          .map((t, idx) => {
            const platform = t.platform ? escapeHtml(t.platform) : "—";
            const line = t.line ? escapeHtml(t.line) : "—";

            return `
              <div class="border rounded-4 p-3 bg-white">
                <div class="d-flex align-items-start justify-content-between gap-3">
                  <div>
                    <div class="small text-secondary mb-1">
                      Tren ${idx + 1} <span class="mono text-secondary">${escapeHtml(t.tripId || "")}</span>
                    </div>
                    <div class="time-big">${escapeHtml(t.originArrival || "—")}</div>
                    <div class="time-small text-secondary">
                      Salida prevista: <strong>${escapeHtml(t.originDeparture || "—")}</strong>
                    </div>
                    <div class="mt-2 text-secondary small">
                      Estimación llegada destino: <strong>${escapeHtml(t.destArrival || "—")}</strong>
                    </div>
                  </div>
                  <div class="text-end">
                    <div class="badge text-bg-dark platform-badge mb-2">Andén/Vía: ${platform}</div>
                    <div class="text-secondary small">Línea: <strong>${line}</strong></div>
                  </div>
                </div>
              </div>
            `;
          })
          .join("");
      }

      /* Construimos sugerencias de stopId para debug en base a la próxima hora. */
      function buildDebugStopIdHints(tripUpdatesJson) {
        const now = epochNowSeconds();
        const entities = Array.isArray(tripUpdatesJson?.entity) ? tripUpdatesJson.entity : [];

        const soon = [];

        for (const ent of entities) {
          const tu = normalizeTripUpdateEntity(ent);
          if (!tu || !tu.stopTimeUpdates.length) {
            continue;
          }

          for (const raw of tu.stopTimeUpdates) {
            const u = normalizeStopTimeUpdate(raw);
            const t = u.departureTime || u.arrivalTime || 0;

            if (!u.stopId || !t) {
              continue;
            }

            if (t > now && t < now + 3600) {
              soon.push({ stopId: u.stopId, time: t });
            }
          }
        }

        soon.sort((a, b) => a.time - b.time);

        const firstByStop = new Map();
        for (const item of soon) {
          if (!firstByStop.has(item.stopId)) {
            firstByStop.set(item.stopId, item.time);
          }
          if (firstByStop.size >= 20) {
            break;
          }
        }

        const lines = [];
        lines.push("No se han encontrado trenes con los stopId configurados.");
        lines.push("Estos son stopId que aparecen con llegadas/salidas en la próxima hora (top 20):");
        lines.push("");

        for (const [stopId, t] of firstByStop.entries()) {
          lines.push(`- stopId ${stopId}  ->  ${toLocalTimeStrFromEpoch(t)}`);
        }

        lines.push("");
        lines.push("Si ves IDs 180xx y 170xx, ya estás en buen camino (Atocha/Chamartín).");
        return lines.join("\n");
      }

      /* Actualizamos datos y pantalla. */
      async function update() {
        if (isUpdating) {
          return;
        }

        isUpdating = true;
        setAlert("");
        setDebug("");
        statusEl.textContent = "Actualizando…";

        try {
          const now = new Date();
          const mode = getModeByTime(now);

          stationTitleEl.textContent = `Estación: ${mode.stationTitle}`;
          subtitleEl.textContent = `Estos son los próximos trenes (${mode.originName} → ${mode.destName}).`;

          statusEl.textContent = "Descargando trip_updates…";
          const tripUpdatesJson = await fetchJsonViaWorker(TRIP_UPDATES_URL, TIMEOUT_TRIP_UPDATES_MS);

          const entities = Array.isArray(tripUpdatesJson?.entity) ? tripUpdatesJson.entity : [];
          const candidates = [];

          for (const ent of entities) {
            const tu = normalizeTripUpdateEntity(ent);
            if (!tu || !tu.tripId || !tu.stopTimeUpdates.length) {
              continue;
            }

            const times = pickTimesForOriginDest(
              tu.stopTimeUpdates,
              mode.originExact,
              mode.originPrefix,
              mode.destExact,
              mode.destPrefix
            );

            if (!times) {
              continue;
            }

            if (!isFutureAtOrigin(times.origin)) {
              continue;
            }

            const originArrival = toLocalTimeStrFromEpoch(times.origin.arrivalTime || times.origin.departureTime);
            const originDeparture = toLocalTimeStrFromEpoch(times.origin.departureTime || times.origin.arrivalTime);
            const destArrival = toLocalTimeStrFromEpoch(times.dest.arrivalTime || times.dest.departureTime);
            const sortEpoch = times.origin.departureTime || times.origin.arrivalTime || 0;

            candidates.push({
              tripId: tu.tripId,
              sortEpoch,
              originArrival,
              originDeparture,
              destArrival,
              platform: "",
              line: "",
            });
          }

          candidates.sort((a, b) => a.sortEpoch - b.sortEpoch);

          const top2 = candidates.slice(0, 2);

          if (!top2.length) {
            setAlert(
              `No se han encontrado trenes con stopId configurados. ` +
              `Origen=[${mode.originExact.join(", ")} + prefijos ${mode.originPrefix.join(", ")}], ` +
              `Destino=[${mode.destExact.join(", ")} + prefijos ${mode.destPrefix.join(", ")}].`
            );

            setDebug(buildDebugStopIdHints(tripUpdatesJson));
            renderTrains([]);
            statusEl.textContent = "Actualizado.";
            return;
          }

          statusEl.textContent = "Descargando vehicle_positions…";
          const vehiclesJson = await fetchJsonViaWorker(VEHICLE_POSITIONS_URL, TIMEOUT_VEHICLES_MS);

          const vehicleMap = buildVehicleMapByTripId(vehiclesJson);

          for (const t of top2) {
            const v = vehicleMap.get(t.tripId);
            if (v) {
              t.platform = v.platform || "";
              t.line = v.line || "";
            }
          }

          renderTrains(top2);
          statusEl.textContent = "Actualizado.";
        } catch (err) {
          statusEl.textContent = "Error al actualizar.";
          setAlert(`Fallo: ${String(err?.message || err)}`);
          renderTrains([]);
        } finally {
          isUpdating = false;
        }
      }

      /* Arrancamos reloj y refresh. */
      tickClock();
      /* Arrancamos el reloj cada CLOCK_MS. */
      setInterval(tickClock, CLOCK_MS);
      /* Ejecutamos primera carga. */
      update();
      /* Ejecutamos refresco automático. */
      setInterval(update, REFRESH_MS);
    </script>
  </body>
</html>
